<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0a0c10" />
  <title>SPY 0DTE Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg:        #0a0c10;
      --surface:   #10131a;
      --card:      #161a22;
      --card2:     #1c212b;
      --border:    #242a35;
      --border2:   #333b49;
      --text:      #f3f5f9;
      --text2:     #b9c1ce;
      --sub:       #8b94a3;
      --muted:     #6b7382;
      --green:     #2ee6a6;
      --green-bg:  rgba(46,230,166,.12);
      --red:       #fb7185;
      --red-bg:    rgba(251,113,133,.12);
      --blue:      #5b9dff;
      --blue-bg:   rgba(91,157,255,.12);
      --amber:     #fbbf24;
      --amber-bg:  rgba(251,191,36,.12);
      --grad:      linear-gradient(135deg,#3b82f6,#8b5cf6);
      --safe-top:    env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      font-variant-numeric: tabular-nums;
    }

    /* ── Header ───────────────────────────────────────────── */
    .header {
      flex-shrink: 0;
      background: rgba(16,19,26,.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: calc(10px + var(--safe-top)) 16px 10px;
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
    }
    .brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .logo {
      width: 34px; height: 34px; border-radius: 9px; background: var(--grad);
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; flex-shrink: 0; box-shadow: 0 2px 10px rgba(99,102,241,.35);
    }
    .brand-text { min-width: 0; }
    .brand-title { font-size: 15px; font-weight: 700; letter-spacing: -.3px; line-height: 1.1; }
    .brand-sub { font-size: 11px; color: var(--sub); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .mkt-chip {
      display: flex; align-items: center; gap: 6px; flex-shrink: 0;
      padding: 6px 11px; border-radius: 999px;
      font-size: 11px; font-weight: 600; letter-spacing: .02em;
      border: 1px solid var(--border2); background: var(--card); color: var(--sub);
    }
    .mkt-chip.open   { color: var(--green); border-color: rgba(46,230,166,.35); background: var(--green-bg); }
    .mkt-chip.warn   { color: var(--amber); border-color: rgba(251,191,36,.35); background: var(--amber-bg); }
    .mkt-chip.closed { color: var(--muted); }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
    .dot.pulse { animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.45;transform:scale(.85)} }

    /* ── Screens ──────────────────────────────────────────── */
    main { flex: 1; position: relative; overflow: hidden; }
    .screen { position: absolute; inset: 0; display: none; flex-direction: column; }
    .screen.active { display: flex; }
    .scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 14px 14px 20px; display: flex; flex-direction: column; gap: 14px; }

    /* ── Cards ────────────────────────────────────────────── */
    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: 16px;
      padding: 16px;
    }
    .card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .card-title { font-size: 11px; font-weight: 700; color: var(--sub); text-transform: uppercase; letter-spacing: .09em; }

    /* ── Account hero ─────────────────────────────────────── */
    .hero {
      background: radial-gradient(120% 120% at 0% 0%, rgba(91,157,255,.10), transparent 55%), var(--card);
      border: 1px solid var(--border); border-radius: 18px; padding: 18px;
    }
    .hero-label { font-size: 12px; color: var(--sub); font-weight: 500; }
    .hero-value { font-size: 34px; font-weight: 800; letter-spacing: -1px; margin-top: 3px; line-height: 1; }
    .hero-sub { display: flex; align-items: center; gap: 8px; margin-top: 8px; font-size: 13px; }
    .pill {
      display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 999px;
      font-size: 12px; font-weight: 700;
    }
    .pill.green { color: var(--green); background: var(--green-bg); }
    .pill.red   { color: var(--red);   background: var(--red-bg); }
    .pill.flat  { color: var(--sub);   background: var(--card2); }
    .hero-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; margin-top: 16px; background: var(--border); border-radius: 12px; overflow: hidden; }
    .hero-cell { background: var(--card); padding: 12px 14px; }
    .hero-cell .l { font-size: 11px; color: var(--sub); font-weight: 500; }
    .hero-cell .v { font-size: 17px; font-weight: 700; margin-top: 3px; }
    .v.green { color: var(--green); } .v.red { color: var(--red); }

    /* ── Agent control ────────────────────────────────────── */
    .agent-top { display: flex; align-items: center; gap: 12px; }
    .agent-info { flex: 1; min-width: 0; }
    .agent-name { font-size: 15px; font-weight: 600; }
    .agent-state { font-size: 12px; color: var(--sub); margin-top: 2px; }
    .agent-state.live { color: var(--amber); font-weight: 600; }
    .agent-state.scan { color: var(--blue); font-weight: 600; }
    .switch {
      width: 52px; height: 30px; border-radius: 999px; background: var(--border2);
      border: none; cursor: pointer; position: relative; transition: background .22s; flex-shrink: 0;
    }
    .switch.on { background: var(--amber); }
    .switch::after { content: ''; position: absolute; top: 3px; left: 3px; width: 24px; height: 24px; border-radius: 50%; background: #fff; transition: left .22s; box-shadow: 0 2px 5px rgba(0,0,0,.45); }
    .switch.on::after { left: 25px; }

    .window-bar {
      margin-top: 14px; padding: 10px 12px; border-radius: 11px;
      background: var(--card2); border: 1px solid var(--border);
      display: flex; align-items: center; gap: 9px; font-size: 12.5px; color: var(--text2);
    }
    .window-bar .ic { font-size: 14px; }
    .window-bar b { color: var(--text); font-weight: 600; }

    .interval-row { display: flex; align-items: center; gap: 7px; margin-top: 12px; }
    .interval-row .lbl { font-size: 12px; color: var(--sub); margin-right: 2px; }
    .int-btn { flex: 1; padding: 8px 0; border-radius: 9px; border: 1px solid var(--border2); background: var(--card2); color: var(--sub); font-size: 12.5px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all .15s; }
    .int-btn.active { background: var(--amber-bg); border-color: rgba(251,191,36,.4); color: var(--amber); }
    .countdown { text-align: center; font-size: 12px; color: var(--muted); margin-top: 10px; }

    .estop {
      width: 100%; margin-top: 12px; padding: 11px; border-radius: 11px;
      border: 1px solid rgba(251,113,133,.4); background: var(--red-bg); color: var(--red);
      font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; display: none;
    }
    .estop:active { background: rgba(251,113,133,.22); }

    /* ── Stats strip ──────────────────────────────────────── */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .stat { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 13px 14px; }
    .stat .l { font-size: 11px; color: var(--sub); font-weight: 600; text-transform: uppercase; letter-spacing: .06em; }
    .stat .v { font-size: 22px; font-weight: 800; margin-top: 5px; letter-spacing: -.5px; }
    .stat .v.green { color: var(--green); } .stat .v.red { color: var(--red); } .stat .v.blue { color: var(--blue); }

    /* ── Positions ────────────────────────────────────────── */
    .pos { background: var(--card2); border: 1px solid var(--border); border-radius: 13px; padding: 13px 14px; margin-top: 10px; }
    .pos:first-of-type { margin-top: 0; }
    .pos-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 9px; }
    .pos-name { display: flex; align-items: center; gap: 7px; font-size: 14px; font-weight: 700; }
    .tag { font-size: 10px; font-weight: 800; padding: 2px 7px; border-radius: 5px; text-transform: uppercase; letter-spacing: .04em; }
    .tag.call { background: var(--green-bg); color: var(--green); }
    .tag.put  { background: var(--red-bg);  color: var(--red); }
    .pos-pnl { font-size: 16px; font-weight: 800; }
    .pos-pnl.green { color: var(--green); } .pos-pnl.red { color: var(--red); }
    .pos-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 6px 14px; font-size: 12px; color: var(--sub); }
    .pos-grid b { color: var(--text2); font-weight: 600; float: right; }
    .empty { text-align: center; padding: 26px 10px; color: var(--muted); font-size: 13px; }
    .empty .ic { font-size: 30px; display: block; margin-bottom: 8px; opacity: .7; }

    /* ── Quick actions ────────────────────────────────────── */
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .act { padding: 13px; border-radius: 13px; border: 1px solid var(--border2); background: var(--card); color: var(--text2); font-size: 13.5px; font-weight: 600; cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 7px; transition: all .15s; }
    .act:active { transform: scale(.98); background: var(--card2); }
    .act.danger { border-color: rgba(251,113,133,.4); background: var(--red-bg); color: var(--red); }

    /* ── Log ──────────────────────────────────────────────── */
    .log-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 6px 0; }
    .log-row { display: flex; gap: 11px; padding: 10px 16px; border-bottom: 1px solid rgba(255,255,255,.035); line-height: 1.5; }
    .log-time { font-size: 11px; color: var(--muted); min-width: 62px; flex-shrink: 0; padding-top: 1px; }
    .log-ic { flex-shrink: 0; font-size: 13px; padding-top: 1px; }
    .log-txt { flex: 1; font-size: 13px; color: var(--text2); white-space: pre-wrap; word-break: break-word; }
    .log-row.agent .log-txt { color: #93c5fd; }
    .log-row.trade .log-txt { color: var(--green); }
    .log-row.error .log-txt { color: var(--red); }
    .log-row.warn  .log-txt { color: var(--amber); }

    .input-bar { flex-shrink: 0; border-top: 1px solid var(--border); padding: 12px 14px calc(12px + var(--safe-bottom)); display: flex; gap: 9px; background: var(--surface); }
    .input-bar input { flex: 1; background: var(--card); border: 1px solid var(--border2); border-radius: 11px; padding: 11px 13px; color: var(--text); font-family: inherit; font-size: 13.5px; outline: none; transition: border-color .15s; }
    .input-bar input:focus { border-color: var(--blue); }
    .input-bar input::placeholder { color: var(--muted); }
    .send { padding: 0 17px; border-radius: 11px; border: none; background: var(--grad); color: #fff; font-size: 13.5px; font-weight: 700; font-family: inherit; cursor: pointer; }
    .send:active { opacity: .85; }

    /* ── Trades ───────────────────────────────────────────── */
    .trade-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 13px 15px; }
    .trade-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .trade-card-time { font-size: 11px; color: var(--sub); }
    .trade-body { font-size: 12.5px; color: var(--text2); line-height: 1.6; white-space: pre-wrap; word-break: break-word; }

    /* ── Bottom nav ───────────────────────────────────────── */
    .nav { flex-shrink: 0; display: flex; background: rgba(16,19,26,.96); backdrop-filter: blur(12px); border-top: 1px solid var(--border); padding-bottom: var(--safe-bottom); }
    .nav-item { flex: 1; padding: 9px 4px 8px; text-align: center; color: var(--muted); cursor: pointer; position: relative; transition: color .15s; }
    .nav-item.active { color: var(--text); }
    .nav-item.active::before { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 30px; height: 3px; border-radius: 0 0 3px 3px; background: var(--grad); }
    .nav-ic { font-size: 20px; display: block; line-height: 1.2; }
    .nav-lbl { font-size: 10.5px; font-weight: 600; margin-top: 2px; letter-spacing: .01em; }
    .nav-badge { position: absolute; top: 6px; right: calc(50% - 22px); min-width: 16px; height: 16px; padding: 0 4px; border-radius: 999px; background: var(--blue); color: #fff; font-size: 10px; font-weight: 800; display: none; align-items: center; justify-content: center; }

    ::-webkit-scrollbar { width: 0; height: 0; }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header class="header">
  <div class="brand">
    <div class="logo">📈</div>
    <div class="brand-text">
      <div class="brand-title">SPY 0DTE</div>
      <div class="brand-sub" id="brand-sub">Connecting…</div>
    </div>
  </div>
  <div class="mkt-chip" id="mkt-chip"><span class="dot"></span><span id="mkt-text">—</span></div>
</header>

<main>
  <!-- ════ HOME ════ -->
  <section class="screen active" id="screen-home">
    <div class="scroll">

      <!-- Account hero -->
      <div class="hero">
        <div class="hero-label">Portfolio Value</div>
        <div class="hero-value" id="h-portfolio">—</div>
        <div class="hero-sub">
          <span class="pill flat" id="h-today-pill">Today —</span>
          <span style="color:var(--sub);font-size:12px;" id="h-today-note">realized P&L</span>
        </div>
        <div class="hero-grid">
          <div class="hero-cell"><div class="l">Buying Power</div><div class="v" id="h-bp">—</div></div>
          <div class="hero-cell"><div class="l">All-Time P&L</div><div class="v" id="h-alltime">—</div></div>
        </div>
      </div>

      <!-- Agent control -->
      <div class="card">
        <div class="agent-top">
          <div class="agent-info">
            <div class="agent-name">Auto Trading</div>
            <div class="agent-state" id="agent-state">Off</div>
          </div>
          <button class="switch" id="switch" onclick="toggleAgent()" aria-label="Toggle auto trading"></button>
        </div>
        <div class="window-bar"><span class="ic" id="win-ic">🕒</span><span id="win-text">Checking market…</span></div>
        <div class="interval-row">
          <span class="lbl">Scan</span>
          <button class="int-btn" data-mins="5"  onclick="setInterval_(5)">5m</button>
          <button class="int-btn" data-mins="10" onclick="setInterval_(10)">10m</button>
          <button class="int-btn" data-mins="15" onclick="setInterval_(15)">15m</button>
          <button class="int-btn" data-mins="30" onclick="setInterval_(30)">30m</button>
        </div>
        <div class="countdown" id="countdown"></div>
        <button class="estop" id="estop" onclick="emergencyStop()">⛔ Emergency Stop</button>
      </div>

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat"><div class="l">Win Rate</div><div class="v green" id="s-winrate">—</div></div>
        <div class="stat"><div class="l">All-Time P&L</div><div class="v" id="s-pnl">—</div></div>
        <div class="stat"><div class="l">Trades</div><div class="v blue" id="s-trades">—</div></div>
        <div class="stat"><div class="l">Scans</div><div class="v" id="s-scans">—</div></div>
      </div>

      <!-- Positions -->
      <div class="card">
        <div class="card-head">
          <span class="card-title">Open Positions</span>
          <span class="card-title" id="pos-count" style="letter-spacing:.04em;"></span>
        </div>
        <div id="positions"><div class="empty"><span class="ic">💤</span>Waiting for agent data…</div></div>
      </div>

      <!-- Quick actions -->
      <div class="actions">
        <button class="act" onclick="manualScan()">⚡ Scan Now</button>
        <button class="act" onclick="refreshAccount(true)">↻ Refresh</button>
        <button class="act" onclick="sendInstruction('REPORT ONLY — do NOT place any orders. Review EVERY position in the account: SPY 0DTE options, any other options, and any stocks/ETFs/equities. For each, give a HOLD, TRIM, or CLOSE opinion with a one-line reason (for SPY 0DTE, judge it against the strategy: trailing stop, underlying vs VWAP/opening range, time-of-day theta). This is advisory only for anything that is not a SPY 0DTE option — never trade non-SPY-0DTE holdings. If nothing is open, say so.')">📋 Manage</button>
        <button class="act danger" onclick="closeAll()">🔒 Close All</button>
      </div>
    </div>
  </section>

  <!-- ════ ACTIVITY ════ -->
  <section class="screen" id="screen-activity">
    <div class="log-list" id="log-list"><div class="empty"><span class="ic">📡</span>Connecting…</div></div>
    <div class="input-bar">
      <input id="msg" placeholder="Send instruction to agent…" onkeydown="if(event.key==='Enter')sendMsg()" />
      <button class="send" onclick="sendMsg()">Send</button>
    </div>
  </section>

  <!-- ════ TRADES ════ -->
  <section class="screen" id="screen-trades">
    <div class="scroll" id="trades-list"><div class="empty"><span class="ic">⚡</span>No trades yet</div></div>
  </section>
</main>

<!-- ── Bottom nav ── -->
<nav class="nav">
  <div class="nav-item active" id="nav-home" onclick="go('home')"><span class="nav-ic">🏠</span><span class="nav-lbl">Home</span></div>
  <div class="nav-item" id="nav-activity" onclick="go('activity')"><span class="nav-ic">📟</span><span class="nav-lbl">Activity</span><span class="nav-badge" id="act-badge">0</span></div>
  <div class="nav-item" id="nav-trades" onclick="go('trades')"><span class="nav-ic">⚡</span><span class="nav-lbl">Trades</span></div>
</nav>

<script>
let agentEnabled = false, scanning = false, currentInterval = 10;
let nextScanAt = null, countdownTimer = null;
let logs = [], trades = [], lastStats = {}, lastAccount = null;
let ACCOUNT = "—", es = null, unseenLogs = 0, acctTimer = null;

/* ── Connection ── */
function connect() {
  if (es) es.close();
  es = new EventSource("/api/stream");
  es.addEventListener("init", e => {
    const d = JSON.parse(e.data);
    logs = d.logs || []; trades = d.trades || [];
    agentEnabled = d.enabled; currentInterval = d.interval || 10; scanning = d.scanning;
    if (d.account) { ACCOUNT = d.account; document.getElementById("brand-sub").textContent = "Robinhood · " + ACCOUNT; }
    lastStats = d.stats || {};
    updateStats(); updateAgent(); renderLogs(); renderTrades();
    refreshAccount();
  });
  es.addEventListener("log",   e => { const x = JSON.parse(e.data); logs.unshift(x); if(logs.length>200)logs.pop(); prependLog(x); if(currentScreen!=="activity"){ unseenLogs++; updateBadge(); } });
  es.addEventListener("trade", e => { trades.unshift(JSON.parse(e.data)); renderTrades(); refreshAccount(true); });
  es.addEventListener("stats", e => { lastStats = JSON.parse(e.data); updateStats(); });
  es.addEventListener("enabled",  e => { agentEnabled = JSON.parse(e.data); updateAgent(); });
  es.addEventListener("interval", e => { currentInterval = JSON.parse(e.data); updateIntervals(); });
  es.addEventListener("status",   e => { scanning = JSON.parse(e.data).scanning; updateAgent(); if(scanning) nextScanAt = null; });
  es.addEventListener("emergency",() => { agentEnabled = false; updateAgent(); });
  es.onerror = () => { setMarketChipOffline(); setTimeout(connect, 3000); };
}

/* ── Market / trade-window state (ET) ── */
function marketState() {
  const et = new Date(new Date().toLocaleString("en-US", { timeZone: "America/New_York" }));
  const day = et.getDay(), m = et.getHours()*60 + et.getMinutes();
  if (day === 0 || day === 6) return { chip:"Weekend", cls:"closed", win:"Market closed — weekend", ic:"🌙" };
  if (m < 9*60+30)  return { chip:"Pre-market", cls:"closed", win:"Pre-market — opens 9:30 AM ET", ic:"🌅" };
  if (m >= 16*60)   return { chip:"Closed",     cls:"closed", win:"Market closed for the day", ic:"🌙" };
  if (m < 9*60+35)  return { chip:"Open",        cls:"warn", win:"Opening — entries begin 9:35 AM", ic:"⏳" };
  if (m < 11*60)    return { chip:"Open",        cls:"open", win:"Trade window — new entries OK", ic:"🟢" };
  if (m < 15*60+45) return { chip:"Open",        cls:"warn", win:"Manage only — no new entries", ic:"🟡" };
  return { chip:"Open", cls:"warn", win:"Closing — flatten by 3:45 PM", ic:"🔴" };
}
function updateMarket() {
  const s = marketState();
  const chip = document.getElementById("mkt-chip"), dot = chip.querySelector(".dot");
  chip.className = "mkt-chip " + s.cls;
  document.getElementById("mkt-text").textContent = s.chip;
  dot.classList.toggle("pulse", s.cls === "open");
  document.getElementById("win-ic").textContent = s.ic;
  document.getElementById("win-text").innerHTML = s.win;
}
function setMarketChipOffline() {
  const chip = document.getElementById("mkt-chip");
  chip.className = "mkt-chip closed";
  chip.querySelector(".dot").classList.remove("pulse");
  document.getElementById("mkt-text").textContent = "Offline";
}

/* ── Stats ── */
function fmt$(n, dp=2) { return n == null || isNaN(n) ? "—" : "$" + Number(n).toLocaleString("en-US",{minimumFractionDigits:dp,maximumFractionDigits:dp}); }
function fmtPnl(n) { if (n == null || isNaN(n)) return "—"; const s = n>=0?"+":"-"; return s + "$" + Math.abs(n).toLocaleString("en-US",{minimumFractionDigits:0,maximumFractionDigits:0}); }
function pnlCls(n) { return n == null || isNaN(n) ? "" : n>0?"green":n<0?"red":""; }

function updateStats() {
  const s = lastStats || {};
  const realized = s.realizedTotal ?? s.currentPnL ?? 0;
  setText("s-scans", s.totalScans ?? "—");
  setText("s-trades", s.totalTrades ?? "—");
  const pnlEl = document.getElementById("s-pnl");
  pnlEl.textContent = (s.realizedTotal != null || s.currentPnL != null) ? fmtPnl(realized) : "—";
  pnlEl.className = "v " + pnlCls(realized);
  const wr = s.winRate;
  const wrEl = document.getElementById("s-winrate");
  wrEl.textContent = wr != null ? wr + "%" : "—";
  wrEl.className = "v " + (wr == null ? "" : wr >= 50 ? "green" : "red");
  // hero all-time + today
  const at = document.getElementById("h-alltime");
  at.textContent = (s.realizedTotal != null || s.currentPnL != null) ? fmtPnl(realized) : "—";
  at.className = "v " + pnlCls(realized);
  const today = s.realizedToday;
  const tp = document.getElementById("h-today-pill");
  if (today != null && !isNaN(today)) {
    tp.textContent = (today>=0?"▲ ":"▼ ") + fmtPnl(today).replace(/^[+-]/,"");
    tp.className = "pill " + (today>0?"green":today<0?"red":"flat");
  } else { tp.textContent = "Today —"; tp.className = "pill flat"; }
}

/* ── Agent UI ── */
function updateAgent() {
  const sw = document.getElementById("switch"), st = document.getElementById("agent-state"), es_ = document.getElementById("estop");
  sw.className = "switch" + (agentEnabled ? " on" : "");
  if (scanning) { st.textContent = "Scanning the market…"; st.className = "agent-state scan"; }
  else if (agentEnabled) { st.textContent = "Live · scanning every " + currentInterval + "m"; st.className = "agent-state live"; }
  else { st.textContent = "Off"; st.className = "agent-state"; }
  es_.style.display = agentEnabled ? "block" : "none";
  updateIntervals();
  if (agentEnabled && !scanning) scheduleCountdown(); else clearCountdown();
}
function updateIntervals() {
  document.querySelectorAll(".int-btn").forEach(b => b.classList.toggle("active", +b.dataset.mins === currentInterval));
}
function scheduleCountdown() {
  clearCountdown();
  if (!nextScanAt) nextScanAt = Date.now() + currentInterval*60000;
  countdownTimer = setInterval(() => {
    if (!agentEnabled) return clearCountdown();
    let secs = Math.max(0, Math.round((nextScanAt - Date.now())/1000));
    const mm = String(Math.floor(secs/60)).padStart(2,"0"), ss = String(secs%60).padStart(2,"0");
    document.getElementById("countdown").textContent = "Next scan in " + mm + ":" + ss;
    if (secs === 0) nextScanAt = Date.now() + currentInterval*60000;
  }, 500);
}
function clearCountdown() { clearInterval(countdownTimer); document.getElementById("countdown").textContent = ""; }

/* ── Logs ── */
const ICONS = { agent:"🤖", trade:"⚡", error:"✕", warn:"⚠", info:"·", scan_start:"⏱" };
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function logEl(e) {
  const d = document.createElement("div");
  d.className = "log-row " + (e.type || "info");
  d.innerHTML = `<span class="log-time">${e.time||""}</span><span class="log-ic">${ICONS[e.type]||"·"}</span><span class="log-txt">${esc(e.content)}</span>`;
  return d;
}
function renderLogs() {
  const a = document.getElementById("log-list");
  if (!logs.length) { a.innerHTML = '<div class="empty"><span class="ic">📡</span>No activity yet</div>'; return; }
  a.innerHTML = ""; logs.forEach(e => a.appendChild(logEl(e)));
}
function prependLog(e) {
  const a = document.getElementById("log-list");
  const em = a.querySelector(".empty"); if (em) a.innerHTML = "";
  a.insertBefore(logEl(e), a.firstChild);
}
function updateBadge() {
  const b = document.getElementById("act-badge");
  if (unseenLogs > 0) { b.textContent = unseenLogs > 99 ? "99+" : unseenLogs; b.style.display = "flex"; }
  else b.style.display = "none";
}

/* ── Trades ── */
function renderTrades() {
  const l = document.getElementById("trades-list");
  if (!trades.length) { l.innerHTML = '<div class="empty"><span class="ic">⚡</span>No trades yet</div>'; return; }
  l.innerHTML = trades.map(t => `
    <div class="trade-card">
      <div class="trade-top">
        <span class="tag ${/(\+|win|gain)/i.test(t.summary)?'call':'put'}" style="background:var(--blue-bg);color:var(--blue);">Trade</span>
        <span class="trade-card-time">${esc((t.date||"")+" "+(t.time||""))}</span>
      </div>
      <div class="trade-body">${esc(t.summary||"")}</div>
    </div>`).join("");
}

/* ── Account ── */
function refreshAccount(force) {
  const url = force ? "/api/account?t=" + Date.now() : "/api/account";
  fetch(url).then(r => r.json()).then(d => { if (!d.error) { lastAccount = d; renderAccount(d); } }).catch(()=>{});
}
function renderAccount(d) {
  setText("h-portfolio", fmt$(d.portfolioValue ?? d.portfolio_value, 2));
  const bp = document.getElementById("h-bp"); bp.textContent = fmt$(d.buyingPower ?? d.buying_power, 2);
  if (d.stats) { lastStats = { ...lastStats, ...d.stats }; updateStats(); }

  const positions = d.positions || [];
  const wrap = document.getElementById("positions");
  document.getElementById("pos-count").textContent = positions.length ? positions.length + (positions.length>1?" open":" open") : "";
  if (!positions.length) {
    wrap.innerHTML = '<div class="empty"><span class="ic">✓</span>No open positions</div>';
    return;
  }
  wrap.innerHTML = positions.map(p => {
    const side = (p.type||"").toLowerCase(), SIDE = side.toUpperCase();
    const pct = p.pnl_pct;
    const expiry = p.expiry ? p.expiry.replace(/^\d{4}-/,"") : "—";
    const val = (p.qty && p.current_price) ? fmt$(p.qty*p.current_price*100,0) : "—";
    return `<div class="pos">
      <div class="pos-top">
        <div class="pos-name">${esc(p.symbol||"SPY")} $${p.strike ?? "—"} <span class="tag ${side==="call"?"call":"put"}">${SIDE}</span> <span style="color:var(--sub);font-weight:500;font-size:12px;">${expiry}</span></div>
        <div class="pos-pnl ${pnlCls(pct)}">${pct==null?"—":(pct>=0?"+":"")+pct.toFixed(0)+"%"}</div>
      </div>
      <div class="pos-grid">
        <span>Qty <b>${p.qty ?? "—"}</b></span>
        <span>Value <b>${val}</b></span>
        <span>Entry <b>${fmt$(p.avg_cost,2)}</b></span>
        <span>Now <b>${fmt$(p.current_price,2)}</b></span>
      </div>
    </div>`;
  }).join("");
}

/* ── Actions ── */
async function toggleAgent() { await fetch(agentEnabled ? "/api/agent/disable" : "/api/agent/enable", { method:"POST" }); }
async function setInterval_(m) { currentInterval = m; updateIntervals(); nextScanAt = null; if (agentEnabled) scheduleCountdown(); await fetch("/api/interval", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({minutes:m}) }); }
async function emergencyStop() { if (!confirm("Trigger emergency stop? This disables auto trading immediately.")) return; await fetch("/api/emergency-stop", { method:"POST" }); }
async function manualScan() { flash("⚡ Scan requested"); await fetch("/api/scan", { method:"POST", headers:{"Content-Type":"application/json"}, body:"{}" }); }
async function closeAll() { if (!confirm("Close ALL open SPY positions now?")) return; await fetch("/api/close-all", { method:"POST" }); }
async function sendInstruction(msg) { await fetch("/api/scan", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({instruction:msg}) }); }
async function sendMsg() { const i = document.getElementById("msg"), m = i.value.trim(); if (!m) return; i.value = ""; flash("Sent: "+m); await sendInstruction(m); }
function flash(t){ /* lightweight inline confirmation via a temporary log row */ prependLog({time:new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"}),type:"info",content:t}); }

/* ── Navigation ── */
let currentScreen = "home";
function go(n) {
  currentScreen = n;
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.querySelectorAll(".nav-item").forEach(t => t.classList.remove("active"));
  document.getElementById("screen-" + n).classList.add("active");
  document.getElementById("nav-" + n).classList.add("active");
  if (n === "activity") { unseenLogs = 0; updateBadge(); }
  if (n === "home") refreshAccount();
}
function setText(id,v){ document.getElementById(id).textContent = v; }

/* ── Boot ── */
updateMarket();
setInterval(updateMarket, 15000);
connect();
acctTimer = setInterval(() => { if (currentScreen === "home") refreshAccount(); }, 45000);
</script>
</body>
